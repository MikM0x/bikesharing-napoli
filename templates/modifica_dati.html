<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifica Dati - Napoli Bike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; position: relative;
        }

        /* HEADER */
        .header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #eee; background: white; z-index: 10;
        }
        .btn-icon { color: #333; font-size: 20px; text-decoration: none; width: 30px; }
        .titolo { font-size: 18px; font-weight: bold; color: #111; }
        .placeholder-right { width: 30px; }

        .content-area { flex: 1; overflow-y: auto; padding: 25px 20px; }

        /* AVATAR MODIFICABILE */
        .avatar-edit-container { text-align: center; margin-bottom: 30px; }
        .avatar-circle { 
            width: 90px; height: 90px; background-color: #f0f2f5; color: #111; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 35px; 
            margin: 0 auto; position: relative; border: 2px dashed #ccc; cursor: pointer;
        }
        .camera-badge {
            position: absolute; bottom: -5px; right: -5px; background: #007bff; color: white;
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .avatar-hint { font-size: 12px; color: #888; margin-top: 10px; }

        /* CAMPI DEL FORM */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .form-input { 
            width: 100%; padding: 14px 14px 14px 45px; 
            border: 1px solid #ddd; border-radius: 12px; font-size: 15px; 
            background-color: #fafafa; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #007bff; background-color: white; }
        .input-icon { position: absolute; left: 16px; top: 16px; color: #aaa; font-size: 15px; }

        /* BOTTONE SALVA */
        .bottom-bar { padding: 20px; border-top: 1px solid #eee; background: white; }
        .btn-salva { 
            width: 100%; background: #111; color: white; padding: 16px; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold; 
            cursor: pointer; display: block; text-align: center; text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .btn-salva:active { background: #333; transform: translateY(2px); }

    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="header">
            <a href="/profilo" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
            <div class="titolo">Modifica Dati</div>
            <div class="placeholder-right"></div>
        </div>

        <div class="content-area">
            
            <div class="avatar-edit-container">
                <div class="avatar-circle">
                    <i class="fas fa-user"></i>
                    <div class="camera-badge"><i class="fas fa-camera"></i></div>
                </div>
                <div class="avatar-hint">Tocca per cambiare foto</div>
            </div>

            <div class="form-group">
                <label class="form-label">Nome</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" class="form-input" value="Mario">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Cognome</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" class="form-input" value="Rossi">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">E-Mail</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" class="form-input" value="mario.rossi@email.com">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Numero di Telefono</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" class="form-input" value="+39 333 1234567">
                </div>
            </div>

        </div>

        <div class="bottom-bar">
            <button class="btn-salva" onclick="salvaDati()">Salva Modifiche</button>
        </div>

    </div>

    <script>
        function salvaDati() {
            // Simuliamo il salvataggio nel database
            alert("✅ Dati aggiornati con successo!");
            window.location.href = '/profilo';
        }
    </script>
</body>
</html>
