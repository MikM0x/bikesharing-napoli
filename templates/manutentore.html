<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Tecnico - Napoli Bike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #000; color: #fff; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: #121212; 
            box-shadow: 0 0 20px rgba(255,255,255,0.05); display: flex; flex-direction: column; position: relative;
            overflow: hidden;
        }

        /* HEADER DEL TECNICO */
        .tech-header { 
            padding: 20px; background: #1e1e1e; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; z-index: 50; /* Sopra la mappa */
        }
        
        .tech-profile { display: flex; align-items: center; gap: 12px; }
        .tech-avatar { 
            width: 45px; height: 45px; background: #333; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #fff;
        }
        .tech-info { display: flex; flex-direction: column; }
        .tech-name { font-size: 16px; font-weight: bold; }
        
        .tech-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; cursor: pointer; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00C851; box-shadow: 0 0 8px #00C851; }
        .status-dot.offline { background: #ff4444; box-shadow: 0 0 8px #ff4444; }

        .btn-menu { color: #fff; font-size: 22px; cursor: pointer; }

        /* BOX DELLE STATISTICHE */
        .stats-container { 
            display: flex; gap: 15px; padding: 15px 20px; background: #121212; z-index: 50;
        }
        .stat-box { 
            flex: 1; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333;
        }
        .stat-box.rosso { background: rgba(255, 68, 68, 0.1); border-color: rgba(255, 68, 68, 0.3); }
        .stat-box.giallo { background: rgba(255, 187, 51, 0.1); border-color: rgba(255, 187, 51, 0.3); }
        
        .stat-number { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
        .stat-box.rosso .stat-number { color: #ff4444; }
        .stat-box.giallo .stat-number { color: #ffbb33; }
        .stat-label { font-size: 11px; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; }

        /* DIV PER LA MAPPA VERA */
        #map { 
            flex: 1; width: 100%; z-index: 10;
        }

        /* I PIN PERSONALIZZATI PER LEAFLET: INVERTITI E GLOWING */
        .custom-pin {
            display: flex; justify-content: center; align-items: center;
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid #1e1e1e; /* keep the thick border style, but color it specifically */
            background-color: #000; /* Interno nero per tutti, come in image_0.png */
            font-size: 16px; font-weight: bold;
            transition: all 0.3s ease; /* For smooth interactions later */
        }

        /* --- EFFETTO GLOWING --- */
        .custom-pin.rosso {
            border-color: #ff4444; /* Bordo rosso */
            color: #ff4444; /* Icona interna rossa */
            /* GLOW: Red box-shadow */
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.7), 0 0 5px rgba(255, 68, 68, 0.5);
        }

        .custom-pin.giallo {
            border-color: #ffbb33; /* Bordo giallo scuro */
            color: #ffbb33; /* Icona interna giallo scuro */
            /* GLOW: Yellow box-shadow */
            box-shadow: 0 0 15px rgba(255, 187, 51, 0.7), 0 0 5px rgba(255, 187, 51, 0.5);
        }

        /* CARD DEL TICKET */
        .ticket-card { 
            position: absolute; bottom: 0; left: 0; width: 100%; background: #1e1e1e; 
            border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 25px 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7); border-top: 1px solid #333;
            transform: translateY(110%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100; /* Deve stare sopra la mappa */
        }
        .ticket-card.aperta { transform: translateY(0); }

        .chiudi-card { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #888; cursor: pointer; }
        
        .ticket-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .ticket-icon { font-size: 28px; }
        .ticket-rosso { color: #ff4444; }
        .ticket-giallo { color: #ffbb33; }
        
        .ticket-bici-id { font-size: 20px; font-weight: bold; color: #fff; }
        .ticket-titolo { font-size: 16px; color: #ddd; margin-bottom: 5px; font-weight: 500; }
        .ticket-desc { font-size: 13px; color: #999; margin-bottom: 25px; line-height: 1.4; }

        /* BOTTONI DEL TECNICO */
        .btn-tech { 
            width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: bold; 
            cursor: pointer; border: none; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-sblocca { background: #333; color: #fff; border: 1px solid #555; }
        .btn-sblocca:active { background: #444; }
        
        .btn-chiudi-ticket { background: #00C851; color: #000; }
        .btn-chiudi-ticket:active { background: #007E33; }

        /* Nasconde il logo di leaflet per un look più pulito */
        .leaflet-control-attribution { display: none; }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="tech-header">
            <div class="tech-profile">
                <div class="tech-avatar">C</div>
                <div class="tech-info">
                    <div class="tech-name">Christian (Staff)</div>
                    <div class="tech-status" onclick="toggleTurno()">
                        <div class="status-dot" id="dot-turno"></div>
                        <span id="text-turno">In Turno</span>
                    </div>
                </div>
            </div>
            <i class="fas fa-ellipsis-v btn-menu" onclick="alert('Menu Impostazioni Tecnico')"></i>
        </div>

        <div class="stats-container">
            <div class="stat-box rosso">
                <div class="stat-number" id="cont-rossi">2</div>
                <div class="stat-label">Allarmi Critici</div>
            </div>
            <div class="stat-box giallo">
                <div class="stat-number" id="cont-gialli">1</div>
                <div class="stat-label">Interventi Minori</div>
            </div>
        </div>

        <div id="map"></div>

        <div class="ticket-card" id="card-ticket">
            <i class="fas fa-times chiudi-card" onclick="chiudiCard()"></i>
            
            <div class="ticket-header">
                <i class="fas fa-exclamation-triangle ticket-icon" id="tk-icona"></i>
                <div class="ticket-bici-id" id="tk-bici">E-Bike ID</div>
            </div>
            
            <div class="ticket-titolo" id="tk-titolo">Titolo Problema</div>
            <div class="ticket-desc" id="tk-desc">Descrizione dettagliata.</div>
            
            <button class="btn-tech btn-sblocca" onclick="alert('Lucchetto sbloccato! (Modalità Manutenzione Gratuita)')">
                <i class="fas fa-unlock">
                </i> Sblocca Bici (Servizio)
            </button>
            <button class="btn-tech btn-chiudi-ticket" onclick="risolviTicket()">
                <i class="fas fa-check-circle"></i> Chiudi Ticket (Ripara)
            </button>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. INIZIALIZZA LA MAPPA SU NAPOLI (Piazza Garibaldi / Centro)
        const map = L.map('map', { zoomControl: false }).setView([40.8520, 14.2680], 14);

        // 2. CARICA UN TEMA SCURO (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // 3. CREIAMO LE ICONE PERSONALIZZATE: INVERTITE E GLOWING
        // Pin Rosso (Triangolo di pericolo)
        const iconaRossa = L.divIcon({
            className: 'custom-leaflet-icon',
            html: '<div class="custom-pin rosso"><i class="fas fa-exclamation-triangle"></i></div>',
            iconSize: [36, 36],
            iconAnchor: [18, 36] // Il pin punta alla base
        });

        // Pin Giallo (Punto esclamativo)
        const iconaGialla = L.divIcon({
            className: 'custom-leaflet-icon',
            html: '<div class="custom-pin giallo"><i class="fas fa-exclamation"></i></div>',
            iconSize: [36, 36],
            iconAnchor: [18, 36]
        });

        // Dizionario per salvare i marker (così li possiamo cancellare)
        let markersGuasti = {};
        let pinAttivo = null;

        // Funzione per aggiungere i pin sulla mappa
        function aggiungiGuasto(id, lat, lng, tipo, bici, titolo, desc) {
            let icona = (tipo === 'rosso') ? iconaRossa : iconaGialla;
            let marker = L.marker([lat, lng], {icon: icona}).addTo(map);
            
            // Quando il manutentore clicca il pin, si apre la card
            marker.on('click', function() {
                apriTicket(id, tipo, bici, titolo, desc);
            });
            
            markersGuasti[id] = { marker: marker, tipo: tipo };
        }

        // Aggiungiamo i 3 guasti di prova a Napoli
        aggiungiGuasto('1', 40.8530, 14.2690, 'rosso', 'E-Bike A92', 'Batteria Esaurita (0%)', 'La bicicletta non risponde ai comandi. Allarme di sistema automatico scattato alle 14:32. Necessaria sostituzione accumulatore.');
        aggiungiGuasto('2', 40.8490, 14.2650, 'rosso', 'E-Bike B14', 'Ruota Forata', 'Segnalazione utente: la ruota anteriore è completamente a terra. Impossibile muovere il mezzo.');
        aggiungiGuasto('3', 40.8550, 14.2600, 'giallo', 'E-Bike C05', 'Freno Allentato', 'Segnalazione utente: il freno sinistro fa rumore e risulta poco teso. La bici è ancora utilizzabile ma necessita controllo.');


        // LOGICA DELL'INTERFACCIA (Card e Turno)
        function toggleTurno() {
            const dot = document.getElementById('dot-turno');
            const testo = document.getElementById('text-turno');
            if (dot.classList.contains('offline')) {
                dot.classList.remove('offline');
                testo.innerText = "In Turno";
            } else {
                dot.classList.add('offline');
                testo.innerText = "Fuori Turno";
            }
        }

        function apriTicket(idPin, colore, bici, titolo, desc) {
            pinAttivo = idPin; 
            
            document.getElementById('tk-bici').innerText = bici;
            document.getElementById('tk-titolo').innerText = titolo;
            document.getElementById('tk-desc').innerText = desc;
            
            const icona = document.getElementById('tk-icona');
            if(colore === 'rosso') {
                icona.className = 'fas fa-exclamation-triangle ticket-icon ticket-rosso';
            } else {
                icona.className = 'fas fa-tools ticket-icon ticket-giallo';
            }

            document.getElementById('card-ticket').classList.add('aperta');
        }

        function chiudiCard() {
            document.getElementById('card-ticket').classList.remove('aperta');
            pinAttivo = null;
        }

        function risolviTicket() {
            alert("Ottimo lavoro! Ticket chiuso e bici di nuovo operativa.");
            chiudiCard();
            
            if(pinAttivo && markersGuasti[pinAttivo]) {
                // 1. Togliamo il Pin dalla mappa vera
                map.removeLayer(markersGuasti[pinAttivo].marker);
                
                // 2. Aggiorniamo i contatori in alto
                if(markersGuasti[pinAttivo].tipo === 'rosso') {
                    const contatore = document.getElementById('cont-rossi');
                    contatore.innerText = parseInt(contatore.innerText) - 1;
                } else {
                    const contatore = document.getElementById('cont-gialli');
                    contatore.innerText = parseInt(contatore.innerText) - 1;
                }
                
                // 3. Cancelliamo il dato
                delete markersGuasti[pinAttivo];
                pinAttivo = null;
            }
        }
    </script>
</body>
</html>
