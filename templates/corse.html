<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Mie Corse - Napoli Bike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: #f8f9fa; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; position: relative;
        }

        /* HEADER */
        .header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            background: white; border-bottom: 1px solid #eee; flex-shrink: 0; z-index: 10;
        }
        .btn-icon { color: #333; font-size: 20px; text-decoration: none; width: 30px; }
        .titolo { font-size: 18px; font-weight: bold; color: #111; }
        .placeholder-right { width: 30px; }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* RIEPILOGO MESE (Opzionale ma fa scena) */
        .riepilogo-mese { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 0 5px; 
        }
        .mese-titolo { font-size: 18px; font-weight: bold; color: #111; }
        .mese-stats { font-size: 14px; color: #666; font-weight: 500; }

        /* LE CARD DELLE CORSE */
        .corsa-card { 
            background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; 
            display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s;
        }
        .corsa-card:active { transform: scale(0.98); background: #fdfdfd; }

        /* Riga Alta: Icona, Data, Prezzo */
        .corsa-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .corsa-info-left { display: flex; gap: 12px; }
        
        .icona-bici-circle { 
            width: 40px; height: 40px; background: rgba(0, 123, 255, 0.1); color: #007bff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; 
        }
        
        .corsa-data { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 3px; }
        .corsa-id { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
        
        .corsa-prezzo { font-size: 16px; font-weight: bold; color: #111; }
        .corsa-prezzo.scontato { color: #28a745; } /* Verde se è coperta da abbonamento */

        /* Riga Bassa: Statistiche viaggio */
        .corsa-bottom { 
            display: flex; gap: 20px; border-top: 1px dashed #eee; padding-top: 12px; margin-top: 5px; 
        }
        .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; font-weight: 500; }
        .stat-item i { color: #aaa; }

    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="header">
            <a href="/" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
            <div class="titolo">Le Mie Corse</div>
            <div class="placeholder-right"></div>
        </div>

        <div class="content-area">
            
            <div class="riepilogo-mese">
                <div class="mese-titolo">Ottobre 2026</div> <div class="mese-stats">3 Corse • 14.5 Km</div>
            </div>

            <div class="corsa-card" onclick="alert('In futuro qui si aprirà il dettaglio e la mappa del percorso di questa specifica corsa!')">
                <div class="corsa-top">
                    <div class="corsa-info-left">
                        <div class="icona-bici-circle"><i class="fas fa-bicycle"></i></div>
                        <div>
                            <div class="corsa-data">Ieri, 18:30</div>
                            <div class="corsa-id"><i class="fas fa-hashtag" style="font-size:10px;"></i> E-Bike A92</div>
                        </div>
                    </div>
                    <div class="corsa-prezzo">€ 3,50</div>
                </div>
                <div class="corsa-bottom">
                    <div class="stat-item"><i class="far fa-clock"></i> 18 min</div>
                    <div class="stat-item"><i class="fas fa-route"></i> 3.2 km</div>
                </div>
            </div>

            <div class="corsa-card" onclick="alert('Dettagli corsa...')">
                <div class="corsa-top">
                    <div class="corsa-info-left">
                        <div class="icona-bici-circle"><i class="fas fa-bicycle"></i></div>
                        <div>
                            <div class="corsa-data">14 Ott, 08:15</div>
                            <div class="corsa-id"><i class="fas fa-hashtag" style="font-size:10px;"></i> E-Bike C14</div>
                        </div>
                    </div>
                    <div class="corsa-prezzo scontato">€ 0,00</div>
                </div>
                <div class="corsa-bottom">
                    <div class="stat-item"><i class="far fa-clock"></i> 12 min</div>
                    <div class="stat-item"><i class="fas fa-route"></i> 2.1 km</div>
                    <div class="stat-item" style="color: #28a745; margin-left: auto; font-size: 11px; font-weight: bold;">
                        <i class="fas fa-bolt" style="color: #28a745;"></i> PIANO ATTIVO
                    </div>
                </div>
            </div>

            <div class="corsa-card" onclick="alert('Dettagli corsa...')">
                <div class="corsa-top">
                    <div class="corsa-info-left">
                        <div class="icona-bici-circle"><i class="fas fa-bicycle"></i></div>
                        <div>
                            <div class="corsa-data">02 Ott, 16:45</div>
                            <div class="corsa-id"><i class="fas fa-hashtag" style="font-size:10px;"></i> E-Bike B88</div>
                        </div>
                    </div>
                    <div class="corsa-prezzo">€ 8,25</div>
                </div>
                <div class="corsa-bottom">
                    <div class="stat-item"><i class="far fa-clock"></i> 45 min</div>
                    <div class="stat-item"><i class="fas fa-route"></i> 9.2 km</div>
                </div>
            </div>

            <div class="riepilogo-mese" style="margin-top: 30px;">
                <div class="mese-titolo">Settembre 2026</div>
                <div class="mese-stats">1 Corsa • 4.0 Km</div>
            </div>

            <div class="corsa-card" style="opacity: 0.8;" onclick="alert('Dettagli corsa...')">
                <div class="corsa-top">
                    <div class="corsa-info-left">
                        <div class="icona-bici-circle" style="background: #f0f0f0; color: #888;"><i class="fas fa-bicycle"></i></div>
                        <div>
                            <div class="corsa-data">28 Set, 09:00</div>
                            <div class="corsa-id"><i class="fas fa-hashtag" style="font-size:10px;"></i> E-Bike F01</div>
                        </div>
                    </div>
                    <div class="corsa-prezzo">€ 4,00</div>
                </div>
                <div class="corsa-bottom">
                    <div class="stat-item"><i class="far fa-clock"></i> 22 min</div>
                    <div class="stat-item"><i class="fas fa-route"></i> 4.0 km</div>
                </div>
            </div>

        </div>

    </div>
</body>
</html>
