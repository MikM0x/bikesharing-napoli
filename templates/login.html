<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Napoli Bike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            padding: 40px 30px; position: relative; overflow-y: auto;
        }

        /* LOGO E TESTO */
        .header-login { text-align: center; margin-top: 5vh; margin-bottom: 35px; }
        .logo-box { 
            width: 80px; height: 80px; background-color: #007bff; color: white; 
            border-radius: 22px; display: flex; align-items: center; justify-content: center; 
            font-size: 40px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,123,255,0.3); 
        }
        .app-title { font-size: 28px; font-weight: bold; color: #111; margin-bottom: 8px; }
        .app-subtitle { font-size: 15px; color: #666; }

        /* CAMPI DEL FORM MIGLIORATI */
        .form-group { margin-bottom: 20px; }
        
        /* Nuove etichette sopra i campi */
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 8px; }
        
        /* Contenitore per gestire icone a destra e sinistra */
        .input-wrapper { position: relative; }
        
        .form-input { 
            width: 100%; padding: 16px 45px; /* Spazio per le icone sia a dx che a sx */
            border: 1px solid #ddd; border-radius: 12px; font-size: 15px; 
            background-color: #fafafa; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #007bff; background-color: white; }
        
        /* Icone base (sinistra) */
        .icona-sx { position: absolute; left: 16px; top: 17px; color: #aaa; font-size: 16px; }
        
        /* L'occhio della password (destra) */
        .icona-dx { position: absolute; right: 16px; top: 17px; color: #888; font-size: 16px; cursor: pointer; }

        /* PASSWORD DIMENTICATA */
        .forgot-password { 
            display: block; text-align: right; color: #007bff; 
            font-size: 13px; font-weight: bold; text-decoration: none; 
            margin-top: 8px; margin-bottom: 35px;
        }

        /* BOTTONE ACCEDI */
        .btn-accedi { 
            width: 100%; background: #007bff; color: white; padding: 16px; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold; 
            cursor: pointer; display: block; text-align: center; text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4); letter-spacing: 1px;
        }
        .btn-accedi:active { background: #0056b3; box-shadow: none; transform: translateY(2px); }

        /* FOOTER REGISTRAZIONE */
        .footer-login { margin-top: auto; text-align: center; font-size: 14px; color: #666; padding-bottom: 10px; }
        .footer-login a { color: #007bff; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="header-login">
            <div class="logo-box">
                <i class="fas fa-bicycle"></i>
            </div>
            <h1 class="app-title">Napoli Bike</h1>
            <p class="app-subtitle">Bentornato! Accedi per continuare.</p>
        </div>

        <div class="form-group">
            <label class="form-label">E-Mail</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope icona-sx"></i>
                <input type="email" class="form-input" placeholder="es. mario.rossi@email.com">
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 5px;">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock icona-sx"></i>
                <input type="password" id="campo-password" class="form-input" placeholder="Inserisci la tua password">
                <i class="fas fa-eye icona-dx" id="occhio-password"></i>
            </div>
        </div>
        
        <a href="#" class="forgot-password">Password dimenticata?</a>

        <a href="/" class="btn-accedi">ACCEDI</a>

        <div class="footer-login">
            Non hai un account? <a href="/registrati">Registrati</a>
        </div>

    </div>

    <script>
        const campoPassword = document.getElementById('campo-password');
        const occhioPassword = document.getElementById('occhio-password');

        occhioPassword.addEventListener('click', function() {
            // Se la password è nascosta, mostrala e cambia l'icona
            if (campoPassword.type === 'password') {
                campoPassword.type = 'text';
                occhioPassword.classList.remove('fa-eye');
                occhioPassword.classList.add('fa-eye-slash'); // Occhio sbarrato
            } else {
                // Altrimenti, nascondila di nuovo e rimetti l'occhio normale
                campoPassword.type = 'password';
                occhioPassword.classList.remove('fa-eye-slash');
                occhioPassword.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
