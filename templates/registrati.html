<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrazione - Napoli Bike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            padding: 30px 30px 20px 30px; position: relative; overflow-y: auto;
        }

        /* LOGO E TESTO (Leggermente più piccoli per fare spazio) */
        .header-reg { text-align: center; margin-top: 2vh; margin-bottom: 25px; }
        .logo-box { 
            width: 65px; height: 65px; background-color: #007bff; color: white; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; margin: 0 auto 15px auto; box-shadow: 0 4px 15px rgba(0,123,255,0.3); 
        }
        .app-title { font-size: 24px; font-weight: bold; color: #111; margin-bottom: 5px; }
        .app-subtitle { font-size: 14px; color: #666; }

        /* CAMPI DEL FORM */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; }
        
        /* Riga per Nome e Cognome affiancati */
        .row-inputs { display: flex; gap: 12px; margin-bottom: 15px; }
        .row-inputs .form-group { margin-bottom: 0; flex: 1; }

        .input-wrapper { position: relative; }
        
        .form-input { 
            width: 100%; padding: 14px 40px; /* Spazio per le icone */
            border: 1px solid #ddd; border-radius: 12px; font-size: 14px; 
            background-color: #fafafa; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #007bff; background-color: white; }
        
        .icona-sx { position: absolute; left: 14px; top: 15px; color: #aaa; font-size: 14px; }
        .icona-dx { position: absolute; right: 14px; top: 15px; color: #888; font-size: 14px; cursor: pointer; }

        /* BOTTONE REGISTRATI */
        .btn-registrati { 
            width: 100%; background: #111; color: white; padding: 16px; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold; 
            cursor: pointer; display: block; text-align: center; text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); letter-spacing: 1px; margin-top: 15px;
        }
        .btn-registrati:active { background: #333; box-shadow: none; transform: translateY(2px); }

        /* FOOTER LOGIN */
        .footer-reg { margin-top: auto; text-align: center; font-size: 14px; color: #666; padding-top: 20px; }
        .footer-reg a { color: #007bff; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="header-reg">
            <div class="logo-box">
                <i class="fas fa-bicycle"></i>
            </div>
            <h1 class="app-title">Crea Account</h1>
            <p class="app-subtitle">Unisciti a Napoli Bike oggi stesso.</p>
        </div>

        <div class="row-inputs">
            <div class="form-group">
                <label class="form-label">Nome</label>
                <div class="input-wrapper">
                    <i class="fas fa-user icona-sx"></i>
                    <input type="text" class="form-input" placeholder="es. Mario">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Cognome</label>
                <div class="input-wrapper">
                    <i class="fas fa-user icona-sx"></i>
                    <input type="text" class="form-input" placeholder="es. Rossi">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">E-Mail</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope icona-sx"></i>
                <input type="email" class="form-input" placeholder="es. mario.rossi@email.com">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock icona-sx"></i>
                <input type="password" id="pass-1" class="form-input" placeholder="Crea una password">
                <i class="fas fa-eye icona-dx" id="occhio-1"></i>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Conferma Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock icona-sx"></i>
                <input type="password" id="pass-2" class="form-input" placeholder="Ripeti la password">
                <i class="fas fa-eye icona-dx" id="occhio-2"></i>
            </div>
        </div>

        <a href="/" class="btn-registrati">REGISTRATI</a>

        <div class="footer-reg">
            Hai già un account? <a href="/login">Accedi qui</a>
        </div>

    </div>

    <script>
        function setupOcchio(idCampo, idOcchio) {
            const campo = document.getElementById(idCampo);
            const occhio = document.getElementById(idOcchio);

            occhio.addEventListener('click', function() {
                if (campo.type === 'password') {
                    campo.type = 'text';
                    occhio.classList.remove('fa-eye');
                    occhio.classList.add('fa-eye-slash');
                } else {
                    campo.type = 'password';
                    occhio.classList.remove('fa-eye-slash');
                    occhio.classList.add('fa-eye');
                }
            });
        }

        // Attiviamo la funzione per entrambi i campi password
        setupOcchio('pass-1', 'occhio-1');
        setupOcchio('pass-2', 'occhio-2');
    </script>
</body>
</html>
