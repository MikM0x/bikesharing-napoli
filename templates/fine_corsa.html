<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corsa Terminata</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        
        #app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: #f8f9fa; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; position: relative;
            overflow: hidden;
        }

        /* 2/5 SUPERIORI: SFONDO VERDE */
        .top-success {
            height: 40vh; background-color: #28a745; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; padding-bottom: 20px;
        }
        .check-circle {
            width: 80px; height: 80px; background-color: rgba(255, 255, 255, 0.2); /* Verde meno opaco/chiaro */
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .titolo-successo { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .sottotitolo-successo { font-size: 14px; opacity: 0.9; }

        /* 3/5 INFERIORI: TENDINA SCONTRINO */
        .bottom-receipt {
            flex: 1; background: white; border-radius: 25px 25px 0 0; margin-top: -25px;
            padding: 30px 20px 20px 20px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 10;
        }
        .drag-handle { width: 40px; height: 5px; background: #ddd; border-radius: 5px; margin-bottom: 20px; }

        .label-totale { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .prezzo-totale { font-size: 38px; font-weight: bold; color: #111; margin-bottom: 15px; }
        
        .badge-pagamento {
            background-color: #e8f5e9; /* Verde molto chiaro */
            color: #2e7d32; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 6px; margin-bottom: 25px;
        }
        .piccolo-check { background-color: #4caf50; color: white; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* IL RIQUADRO DELLA CORSA */
        .receipt-box { width: 100%; border: 1px solid #eaeaea; border-radius: 16px; padding: 18px; background: #fafafa; margin-bottom: 25px; }
        
        .bike-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .bike-info-left { display: flex; align-items: center; }
        .bike-icon-circle { width: 45px; height: 45px; background-color: rgba(0, 123, 255, 0.1); color: #007bff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; }
        .bike-nome { font-weight: bold; font-size: 16px; color: #333; }
        .bike-data { font-size: 12px; color: #888; margin-top: 2px; }
        .bike-durata { font-weight: bold; font-size: 16px; color: #111; }

        .divisore { border-top: 1px dashed #ddd; margin: 15px 0; }

        /* RESOCONTO PREZZI */
        .price-row { display: flex; justify-content: space-between; font-size: 14px; color: #555; margin-bottom: 8px; }
        .price-row.sconto { color: #28a745; font-weight: bold; }
        .price-row.totale-riga { color: #111; font-weight: bold; margin-top: 10px; }

        /* BOTTONI IN BASSO */
        .button-group { display: flex; gap: 10px; width: 100%; margin-top: auto; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center; }
        
        .btn-segnala { background-color: white; color: #111; border: 2px solid #111; }
        .btn-home { background-color: #111; color: white; border: 2px solid #111; }

    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="top-success">
            <div class="check-circle"><i class="fas fa-check"></i></div>
            <div class="titolo-successo">Corsa Terminata!</div>
            <div class="sottotitolo-successo">Speriamo ti sia divertito.</div>
        </div>

        <div class="bottom-receipt">
            <div class="drag-handle"></div>
            
            <div class="label-totale">TOTALE PAGATO</div>
            <div class="prezzo-totale">€ 3,50</div>
            
            <div class="badge-pagamento">
                <div class="piccolo-check"><i class="fas fa-check"></i></div> Pagamento Riuscito
            </div>

            <div class="receipt-box">
                <div class="bike-row">
                    <div class="bike-info-left">
                        <div class="bike-icon-circle"><i class="fas fa-bicycle"></i></div>
                        <div>
                            <div class="bike-nome">E-Bike #A92</div>
                            <div class="bike-data">14 Ott. 10:30</div>
                        </div>
                    </div>
                    <div class="bike-durata">18 min</div>
                </div>

                <div class="divisore"></div>

                <div class="price-row">
                    <span>Sblocco</span>
                    <span>€ 1,00</span>
                </div>
                <div class="price-row">
                    <span>Tempo (18m x €0,25)</span>
                    <span>€ 4,50</span>
                </div>
                <div class="price-row sconto">
                    <span>Sconto Studenti</span>
                    <span>-€ 2,00</span>
                </div>
            </div>

            <div class="button-group">
                <a href="/segnala_problema" class="btn btn-segnala" style="text-decoration: none;">Segnala Problema</a>
                <a href="/termina_corsa" class="btn btn-home" style="text-decoration: none;">Torna alla Home</a>
            </div>

        </div>

    </div>

</body>
</html>
